# Dec 项目变量定义
# 资产模板中的 {{VAR_NAME}} 会在 dec pull 时替换
# 优先级：assets.<type>.<name>.vars > vars > 机器级变量 (~/.dec/local/vars.yaml)

vars:
  TASK_DOCS_DIR: "docs/tasks"
  VIKUNJA_PROJECT: "Dec"
  # 稳定的流程 bucket / type label 由共享资产固化，不需要写进 vars
  # API_BASE_URL: "https://api.example.com"
  # API_TOKEN: "<TOKEN>"

assets:
