name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "version.json"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::无效版本号格式: ${VERSION}，期望格式为 vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${VERSION}$"; then
            echo "::error::Tag ${VERSION} 已存在，请先修改 version.json"
            exit 1
          fi

  test:
    name: Test
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./... -v

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [test, validate]
    if: ${{ needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Use validated version
        id: version
        run: |
          echo "version=${{ needs.validate.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="dec-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" -o "$OUTPUT" .
          echo "artifact=${OUTPUT}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dec-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.artifact }}

  release:
    name: Release
    needs: [build, validate]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create git tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          files: dist/*
          generate_release_notes: true

      - name: Sync ReleaseLatest branch
        run: |
          git push origin HEAD:refs/heads/ReleaseLatest --force
